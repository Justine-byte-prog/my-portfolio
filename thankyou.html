<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent | Justine Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: black;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        /* Video Background - Gaya ng Home Page mo */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        #myVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Filter para maging pink ang mata ni Spiderman */
            filter: brightness(0.8) contrast(1.3) saturate(1.5) hue-rotate(115deg);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: -1;
        }

        /* Glass Box Message */
        .message-box {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 50px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 182, 193, 0.2);
            max-width: 550px;
            width: 90%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        h1 span {
            color: pink;
            text-shadow: 0 0 15px pink, 0 0 2px pink;
        }

        p {
            font-size: 1.1rem;
            color: #ddd;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Back to Home Button - Pink Glowing */
        .back-btn {
            display: inline-block;
            padding: 12px 40px;
            background-color: #ffb6c1;
            color: white;
            text-decoration: none;
            font-weight: 700;
            border-radius: 5px;
            transition: 0.3s linear;
            border: 2px solid transparent;
            font-size: 1.1rem;
        }

        .back-btn:hover {
            transform: scale(1.1);
            color: pink;
            border: 2px solid pink;
            background-color: transparent;
            box-shadow: 0 0 40px pink;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="video-bg">
        <!-- Siguraduhin na tama ang path ng video mo -->
        <video autoplay muted loop playsinline id="myVideo">
            <source src="Justine/Spiderman.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </div>

    <div class="message-box">
        <h1>Message <span>Sent!</span></h1>
        <p>Salamat, Justine! Nakuha ko na ang iyong mensahe. I'll get back to you soon.</p>
        <!-- Link pabalik sa main page mo -->
        <a href="index.html" class="back-btn">Back to Home</a>
    </div>

</body>
</html>
